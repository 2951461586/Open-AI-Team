name: ai-team-harness

services:
  ai-team:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ai-team-harness:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      IN_DOCKER: "1"
    ports:
      - "${PORT:-19090}:${PORT:-19090}"
    volumes:
      - ./state:/app/state
      - ./task_workspaces:/app/task_workspaces
      - ./config/team:/app/config/team:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${PORT:-19090}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

name: electron-release

on:
  push:
    tags:
      - 'electron-v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          npm ci
          cd dashboard
          npm ci
          cd ../electron
          npm ci

      - name: Build dashboard
        run: |
          cd ../dashboard
          npm run build

      - name: Build Electron
        run: |
          cd ../electron
          npx electron-builder --win --dir
        env:
          ELECTRON_CACHE: /tmp/electron-cache

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-win32
          path: |
            electron/dist/win-unpacked/**
            electron/dist/*.exe

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/electron-v')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: electron-win32
          path: artifacts

      - name: List files
        run: |
          ls -la artifacts/
          find artifacts/ -type f -name "*.exe"

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" \) -exec sha256sum {} \; > SHA256SUMS.txt || true
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Electron ${{ github.ref }}
          draft: true
          prerelease: false
          files: |
            artifacts/**/*.exe
            artifacts/**/SHA256SUMS.txt

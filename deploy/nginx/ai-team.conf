upstream ai_team_backend {
    server localhost:19090;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100M;
    client_body_timeout 300s;
    proxy_read_timeout 300s;

    location /api/ {
        proxy_pass http://ai_team_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://ai_team_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    location /mcp/ {
        proxy_pass http://ai_team_backend:7331/;
        proxy_http_version 1.1;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
    }

    location / {
        return 404 '{"error": "Frontend served separately. API at /api/"}';
    }
}

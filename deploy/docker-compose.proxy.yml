version: '3.8'

services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "19090:80"
    volumes:
      - ./deploy/nginx/ai-team.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ai-team
    networks:
      - ai-team-net

  ai-team:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: ai-team-harness:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 19090
      BIND: 127.0.0.1
      TEAM_DB_PATH: /app/state/team-runtime.db
      TEAM_TASK_WORKSPACE_ROOT: /app/task_workspaces
      MCP_PORT: 7331
      MCP_ENABLED: "true"
      IN_DOCKER: "1"
      CONTAINER: "1"
    volumes:
      - ./state:/app/state
      - ./task_workspaces:/app/task_workspaces
      - ./config/team:/app/config/team:ro
      - ./.env:/app/.env:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:19090/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 6
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ai-team-net

networks:
  ai-team-net:
    driver: bridge

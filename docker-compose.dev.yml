# Development mode — hot reload with source mounting
# Usage: docker compose -f docker-compose.dev.yml up

name: ai-team-harness-dev

services:
  ai-team:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    image: ai-team-harness:dev
    command: ["node", "--watch", "src/index.mjs"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
    ports:
      - "${PORT:-19090}:${PORT:-19090}"
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
      - ./config/team:/app/config/team:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${PORT:-19090}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  app_node_modules:

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    image: ai-team-harness:dev
    command: ["node", "--watch", "src/index.mjs"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: ${PORT:-19090}
      BIND: 0.0.0.0
      TEAM_DB_PATH: ${TEAM_DB_PATH:-/app/state/team-runtime.db}
      TEAM_TASK_WORKSPACE_ROOT: ${TEAM_TASK_WORKSPACE_ROOT:-/app/task_workspaces}
    ports:
      - "${PORT:-19090}:${PORT:-19090}"
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
      - ./config/team:/app/config/team:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${PORT:-19090}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - ai-team-net

volumes:
  app_node_modules:

networks:
  ai-team-net:
    driver: bridge
